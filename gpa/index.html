            "工学化学概論": { category: "専門_その他" },

            "アカデミック・ライティング": { category: "専門_その他" },
            "コンピュータ実習Ⅰ": { category: "専門_その他" },
            "機械知能・航空研修Ⅰ": { category: "専門_その他" },
            "計画及び製図Ⅰ": { category: "専門_その他" },
            "コンピュータ実習": { category: "専門_その他" },
            "計画及び製図": { category: "専門_その他" },
            "機械知能・航空研修A1": { category: "専門_その他" },
            "量子サイエンス入門": { category: "専門_その他" },
            "機械知能・航空研修A": { category: "専門_その他" },
            "エネルギー環境入門": { category: "専門_その他" },
            "機械知能・航空実験Ⅰ": { category: "専門_その他" },
            "機械知能・航空研修Ⅱ": { category: "専門_その他" },
            "機械工作実習": { category: "専門_その他" },
            "機械知能・航空研修A2": { category: "専門_その他" },
            "機械知能・航空実験A": { category: "専門_その他" },
            "機械知能・航空研修B": { category: "専門_その他" },
            "コンピュータ実習Ⅱ": { category: "専門_その他" },
            "機械知能・航空実験Ⅱ": { category: "専門_その他" },
            "計画及び製図Ⅱ": { category: "専門_その他" },
            "機械知能・航空実験B": { category: "専門_その他" },
            "エネルギー環境コース特別講義": { category: "専門_その他" },
            "学外見学(補足1)": { category: "専門_その他" },
            "学外実習": { category: "専門_その他" },
            "機械知能・航空特別研修": { category: "専門_その他" },
            "機械知能・航空特別講義Ⅰ(補足2)": { category: "専門_その他" },
            "機械知能・航空特別講義Ⅱ": { category: "専門_その他" },
            "国際工学研修Ⅰ〜Ⅳ": { category: "専門_その他" },
            "工学教育院特別講義": { category: "専門_その他" },
            "卒業研究": { category: "専門_その他" }
        };

        // Logic Functions
        function resolveSubstitutions(progress) {
            let finalSentaku3 = progress.zen_sentaku3;
            let remainingSentaku4 = progress.zen_sentaku4;

            if (finalSentaku3 < 6 && remainingSentaku4 > 0) {
                let shortfall = 6 - finalSentaku3;
                let transferable = Math.min(shortfall, remainingSentaku4, 2); // Max 2 credits
                finalSentaku3 += transferable;
                progress.zen_sentaku4 -= transferable;
            }
            return finalSentaku3;
        }

        function check3rdSemester(progress, course) {
            let errors = [];

            if (!progress.passedSpecificSubjects.includes("自然科学総合実験")) {
                errors.push("未達成: 「自然科学総合実験」の修得");
            }

            let group24Total = progress.zen_hissyu + progress.zen_sentaku4 + progress.sen_kyotsu;
            if (group24Total < 24) {
                errors.push(`未達成: 指定群(自然科学・情報・学術基礎・工学共通)から24単位 (現在: ${group24Total.toFixed(1)}単位 / 不足: ${(24 - group24Total).toFixed(1)}単位)`);
            }

            let hissyu15Total = progress.zen_hissyu + progress.sen_kyotsu;
            if (hissyu15Total < 15) {
                errors.push(`未達成: 必修群科目から15単位 (現在: ${hissyu15Total.toFixed(1)}単位 / 不足: ${(15 - hissyu15Total).toFixed(1)}単位)`);
            }

            if (progress.zen_lang < 4) {
                errors.push(`未達成: 外国語群から4単位 (現在: ${progress.zen_lang.toFixed(1)}単位)`);
            }

            let sen12Total = progress.sen_sentaku_hit_1 + progress.sen_sentaku_hit_2;
            if (sen12Total < 12) {
                errors.push(`未達成: 専門[選択必修①][②]から12単位 (現在: ${sen12Total.toFixed(1)}単位)`);
            }

            return errors;
        }

        function check6thSemester(progress, course) { // Mock based on probable rules
            let errors = [];
            if (progress.totalCredits < 100) {
                errors.push(`未達成: 総取得単位数100単位 (現在: ${progress.totalCredits.toFixed(1)}単位)`);
            }
            if (progress.sen_hissyu < 20) {
                errors.push(`未達成: 専門学科必修20単位 (現在: ${progress.sen_hissyu.toFixed(1)}単位)`);
            }
            return errors;
        }

        function checkGraduation(progress, course) { // Mock based on spec
            let errors = [];
            if (progress.totalCredits < 130) {
                errors.push(`未達成: 卒業要件総単位130単位 (現在: ${progress.totalCredits.toFixed(1)}単位)`);
            }

            let totalZen = progress.zen_hissyu + progress.zen_sentaku1 + progress.zen_sentaku2 + progress.zen_sentaku3 + progress.zen_sentaku4;
            if (totalZen < 39) { // Including applied subs
                errors.push(`未達成: 全学教育群39単位 (現在: ${totalZen.toFixed(1)}単位)`);
            }
            return errors;
        }


        function App() {
            const [inputText, setInputText] = useState("");
            const [selectedCourse, setSelectedCourse] = useState(COURSES[0]);
            const [manualCategories, setManualCategories] = useState({});
            const [parsedData, setParsedData] = useState([]);
            const [error, setError] = useState(null);

            const lineChartRef = useRef(null);
            const pieChartRef = useRef(null);
            const lineChartInstance = useRef(null);
            const pieChartInstance = useRef(null);

            // Parsing Logic
            const parseGrades = (text) => {
                if (!text.trim()) {
                    setParsedData([]);
                    setError(null);
                    return;
                }

                const normalized = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).toUpperCase();
                const lines = normalized.split('\n').map(l => l.trim()).filter(Boolean);

                const results = [];
                let parsedCount = 0;

                for (const line of lines) {
                    const match = line.match(/^(.*?)\s*(\d+\.\d+)\s*(AA|[A-E]|N)\s*(.*)$/i);
                    if (match) {
                        const rawName = match[1].trim();
                        const credit = parseFloat(match[2]);
                        const grade = match[3];
                        const remainder = match[4];
                        const termMatch = remainder.match(/(20\d{2}[^\s]{2,4})/);
                        const term = termMatch ? termMatch[1] : 'Unknown';

                        // Sub master check
                        let category = "不明";
                        if (SUBJECT_MASTER[rawName]) {
                            category = SUBJECT_MASTER[rawName].category;
                        } else if (manualCategories[rawName]) {
                            category = manualCategories[rawName];
                        }

                        results.push({
                            id: Math.random().toString(36).substr(2, 9),
                            name: rawName,
                            credit: credit,
                            grade: grade,
                            term: term,
                            category: category,
                            original: line
                        });
                        parsedCount++;
                    }
                }

                if (parsedCount === 0 && lines.length > 0) {
                    setError("テキストを解析できませんでした。フォーマットを確認してください。");
                } else {
                    setError(null);
                    setParsedData(results.sort((a, b) => a.term.localeCompare(b.term)));
                }
            };

            // Re-apply categories if manualCategories change without reparsing text
            useEffect(() => {
                if (parsedData.length > 0) {
                    setParsedData(prev => prev.map(item => {
                        if (SUBJECT_MASTER[item.name]) return { ...item, category: SUBJECT_MASTER[item.name].category };
                        if (manualCategories[item.name]) return { ...item, category: manualCategories[item.name] };
                        return { ...item, category: "不明" };
                    }));
                }
            }, [manualCategories]);

            const handleManualCatChange = (subjectName, newCat) => {
                setManualCategories(prev => ({ ...prev, [subjectName]: newCat }));
            };

            // Calculation Logic
            const stats = useMemo(() => {
                let totalGP = 0;
                let gpaDenominator = 0;
                let gradeCounts = { 'AA': 0, 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'N/E': 0 };

                let progress = {
                    totalCredits: 0, passedSpecificSubjects: [],
                    zen_hissyu: 0, zen_sentaku1: 0, zen_sentaku2: 0, zen_sentaku3: 0, zen_sentaku4: 0, zen_lang: 0,
                    sen_kyotsu: 0, sen_hissyu: 0, sen_sentaku_hit_1: 0, sen_sentaku_hit_2: 0, sen_sentaku_hit_3: 0, sen_other: 0,
                    failedCredits: 0
                };

                const termGroups = {};

                parsedData.forEach(c => {
                    // GPA Calculation
                    if (GRADE_POINTS[c.grade] !== undefined && c.grade !== 'N') {
                        gpaDenominator += c.credit;
                        totalGP += c.credit * GRADE_POINTS[c.grade];
                    }

                    // Distribution
                    if (gradeCounts[c.grade] !== undefined) gradeCounts[c.grade] += 1;
                    else gradeCounts['N/E'] += 1;

                    // GPA Chart Stats
                    if (c.term !== 'Unknown') {
                        if (!termGroups[c.term]) termGroups[c.term] = { term: c.term, totalGP: 0, denominator: 0 };
                        if (GRADE_POINTS[c.grade] !== undefined && c.grade !== 'N') {
                            termGroups[c.term].denominator += c.credit;
                            termGroups[c.term].totalGP += c.credit * GRADE_POINTS[c.grade];
                        }
                    }

                    // Progress Requirements Calculation (AA~C, N)
                    if (['AA', 'A', 'B', 'C', 'N'].includes(c.grade)) {
                        progress.totalCredits += c.credit;
                        progress.passedSpecificSubjects.push(c.name);

                        switch (c.category) {
                            case "全学_必修": progress.zen_hissyu += c.credit; break;
                            case "全学_選択1": progress.zen_sentaku1 += c.credit; break;
                            case "全学_選択2": progress.zen_sentaku2 += c.credit; break;
                            case "全学_選択3": progress.zen_sentaku3 += c.credit; break;
                            case "全学_選択4": progress.zen_sentaku4 += c.credit; break;
                            case "全学_外国語": progress.zen_lang += c.credit; break;
                            case "専門_工学共通": progress.sen_kyotsu += c.credit; break;
                            case "専門_学科必修": progress.sen_hissyu += c.credit; break;
                            case "専門_選択必修1": progress.sen_sentaku_hit_1 += c.credit; break;
                            case "専門_選択必修2": progress.sen_sentaku_hit_2 += c.credit; break;
                            case "専門_選択必修3": progress.sen_sentaku_hit_3 += c.credit; break;
                            default: progress.sen_other += c.credit; break;
                        }
                    }
                    if (['D', 'E'].includes(c.grade)) {
                        progress.failedCredits += c.credit;
                    }
                });

                // Apply logic (modifies progress object directly)
                progress.zen_sentaku3 = resolveSubstitutions(progress);

                const gpa = gpaDenominator > 0 ? (totalGP / gpaDenominator).toFixed(3) : "0.000";

                const termChartData = Object.values(termGroups)
                    .sort((a, b) => a.term.localeCompare(b.term))
                    .map(t => ({
                        term: t.term,
                        gpa: t.denominator > 0 ? parseFloat((t.totalGP / t.denominator).toFixed(2)) : 0
                    }))
                    .filter(t => t.gpa > 0);

                const pieLabels = [];
                const pieDataVals = [];
                Object.entries(gradeCounts).forEach(([name, value]) => {
                    if (value > 0) { pieLabels.push(name); pieDataVals.push(value); }
                });

                return { gpa, progress, termChartData, pieLabels, pieDataVals, gpaDenominator };
            }, [parsedData, selectedCourse]);

            // Charts Initialization
            useEffect(() => {
                // Line Chart
                if (stats.termChartData.length > 0 && lineChartRef.current) {
                    if (lineChartInstance.current) lineChartInstance.current.destroy();
                    const ctx = lineChartRef.current.getContext('2d');
                    lineChartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: stats.termChartData.map(d => d.term),
                            datasets: [{
                                label: 'GPA', data: stats.termChartData.map(d => d.gpa),
                                borderColor: '#4F46E5', backgroundColor: '#4F46E5', tension: 0.3, borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#4F46E5'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 4, grid: { color: '#334155' }, ticks: { color: '#64748B' } }, x: { grid: { display: false }, ticks: { color: '#64748B' } } }, plugins: { legend: { display: false } } }
                    });
                }
                // Pie Chart
                if (stats.pieDataVals.length > 0 && pieChartRef.current) {
                    if (pieChartInstance.current) pieChartInstance.current.destroy();
                    const ctx = pieChartRef.current.getContext('2d');
                    pieChartInstance.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: { labels: stats.pieLabels, datasets: [{ data: stats.pieDataVals, backgroundColor: COLORS, borderWidth: 0, hoverOffset: 4 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#F8FAFC' } } }, cutout: '70%' }
                    });
                }
            }, [stats.termChartData, stats.pieDataVals]);

            // Trackers Status
            const barrier3Errors = check3rdSemester(stats.progress, selectedCourse);
            const barrier6Errors = check6thSemester(stats.progress, selectedCourse);
            const gradErrors = checkGraduation(stats.progress, selectedCourse);

            const unknowns = parsedData.filter(d => d.category === "不明");
            const uniqueUnknowns = Array.from(new Set(unknowns.map(u => u.name)));

            const TrackerCard = ({ title, errors, children }) => {
                const isClear = errors.length === 0 && parsedData.length > 0;
                const [isOpen, setIsOpen] = useState(false);
                return (
                    <div className="bg-surface border border-slate-700 rounded-2xl shadow-lg overflow-hidden">
                        <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between p-5 hover:bg-slate-700/30 transition-colors">
                            <div className="flex items-center gap-3">
                                {parsedData.length === 0 ? <div className="w-5 h-5 rounded-full bg-slate-600"></div> : isClear ? <CheckIcon /> : <AlertTriIcon />}
                                <h3 className="font-semibold text-lg text-white">{title}</h3>
                            </div>
                            <div className="text-slate-400">
                                {isOpen ? "▲" : "▼"}
                            </div>
                        </button>
                        {isOpen && (
                            <div className="p-5 border-t border-slate-700 bg-slate-800/50">
                                {parsedData.length === 0 ? (
                                    <p className="text-slate-400 text-sm">データを入力してください。</p>
                                ) : errors.length > 0 ? (
                                    <ul className="space-y-2 text-sm text-red-400 font-medium">
                                        {errors.map((e, i) => <li key={i} className="flex gap-2 items-start"><span className="mt-0.5">•</span><span>{e}</span></li>)}
                                    </ul>
                                ) : (
                                    <p className="text-emerald-400 text-sm font-medium">条件を満たしています！</p>
                                )}
                                {children && <div className="mt-4 border-t border-slate-700 pt-4">{children}</div>}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="max-w-7xl mx-auto space-y-8">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-surface pb-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-primary/20 p-3 rounded-xl text-primary"><CalculatorIcon /></div>
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight text-white">GPA & Graduation Tracker</h1>
                                <p className="text-slate-400 mt-1">東北大学 工学部（機械知能・航空工学科）特化</p>
                            </div>
                        </div>
                        <div className="bg-surface p-3 rounded-xl border border-slate-700">
                            <label className="text-xs text-slate-400 block mb-1 font-medium">コース選択</label>
                            <select
                                value={selectedCourse}
                                onChange={(e) => setSelectedCourse(e.target.value)}
                                className="bg-dark text-white text-sm font-semibold p-2 pr-8 rounded-lg outline-none border border-slate-600 focus:border-primary"
                            >
                                {COURSES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">

                        {/* Left Column: Input */}
                        <div className="xl:col-span-1 space-y-6">
                            <div className="bg-surface border border-slate-700 rounded-2xl p-6 shadow-xl">
                                <h2 className="text-xl font-semibold mb-2">データの入力</h2>
                                <p className="text-xs text-slate-400 mb-4 pb-4 border-b border-slate-700">ISTU等の成績表をコピー＆ペースト</p>
                                <textarea
                                    className="w-full h-48 bg-dark border border-slate-700 rounded-xl p-4 text-sm text-slate-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-y"
                                    placeholder="例:&#10;流体力学Ⅰ 2.0 ＡＡ ○ 2023前期&#10;論理学 2.0 Ａ 2022後期"
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                ></textarea>
                                {error && <div className="mt-3 p-3 bg-red-900/30 border border-red-800 rounded-lg flex items-start gap-2 text-red-400 text-sm"><AlertIcon /><span>{error}</span></div>}
                                <button onClick={() => parseGrades(inputText)} className="mt-4 w-full bg-primary hover:bg-indigo-500 text-white font-medium py-3 rounded-xl transition-colors shadow-lg shadow-primary/20">
                                    解析して計算する
                                </button>
                            </div>

                            {uniqueUnknowns.length > 0 && (
                                <div className="bg-amber-900/20 border border-amber-700/50 rounded-2xl p-5 shadow-xl">
                                    <h3 className="text-amber-400 font-semibold flex items-center gap-2 mb-3"><AlertTriIcon /> 未分類科目があります</h3>
                                    <p className="text-xs text-amber-200/70 mb-4">マスターデータに存在しない科目です。要件計算のために区分を手動で割り当ててください。</p>
                                    <div className="space-y-3 max-h-64 overflow-y-auto pr-2">
                                        {uniqueUnknowns.map(name => (
                                            <div key={name} className="bg-dark/50 p-2.5 rounded-lg border border-amber-900/30">
                                                <p className="text-sm text-slate-200 font-medium mb-1 truncate">{name}</p>
                                                <select
                                                    value={manualCategories[name] || "不明"}
                                                    onChange={(e) => handleManualCatChange(name, e.target.value)}
                                                    className="w-full bg-slate-800 text-xs text-white p-1.5 rounded outline-none border border-slate-600"
                                                >
                                                    {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat.replace('_', ' ')}</option>)}
                                                </select>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Right Column: Dashboards & Needs */}
                        <div className="xl:col-span-2 space-y-6">

                            {/* Dashboard Cards (Top) */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-surface border border-slate-700 rounded-2xl p-5 shadow-lg relative overflow-hidden">
                                    <p className="text-slate-400 text-xs font-medium mb-1">通算GPA</p>
                                    <p className="text-3xl font-bold text-white mb-1">{stats.gpa}</p>
                                    <p className="text-[10px] text-slate-500">対象: {stats.gpaDenominator}単位</p>
                                </div>
                                <div className="bg-surface border border-slate-700 rounded-2xl p-5 shadow-lg">
                                    <p className="text-slate-400 text-xs font-medium mb-1">総修得単位</p>
                                    <p className="text-3xl font-bold text-emerald-400">{stats.progress.totalCredits}</p>
                                </div>
                                <div className="bg-surface border border-slate-700 rounded-2xl p-5 shadow-lg hidden md:block">
                                    <p className="text-slate-400 text-xs font-medium mb-1">未修得(D/E)</p>
                                    <p className="text-3xl font-bold text-red-500">{stats.progress.failedCredits}</p>
                                </div>
                                <div className="bg-surface border border-slate-700 rounded-2xl p-5 shadow-lg hidden md:block">
                                    <p className="text-slate-400 text-xs font-medium mb-1">全学教育単位</p>
                                    <p className="text-3xl font-bold text-blue-400">
                                        {stats.progress.zen_hissyu + stats.progress.zen_sentaku1 + stats.progress.zen_sentaku2 + stats.progress.zen_sentaku3 + stats.progress.zen_sentaku4}
                                    </p>
                                </div>
                            </div>

                            {/* Requirements Tracker */}
                            <div className="space-y-4">
                                <h2 className="text-xl font-semibold flex items-center gap-2 mt-4 text-white">
                                    要件チェッカー
                                </h2>

                                <TrackerCard title="3セメスターバリア" errors={barrier3Errors} />
                                <TrackerCard title="6セメスターバリア" errors={barrier6Errors} />

                                <TrackerCard title="卒業要件 (130単位)" errors={gradErrors}>
                                    <div className="space-y-3">
                                        <div>
                                            <div className="flex justify-between text-xs mb-1">
                                                <span className="text-slate-300">全体の進捗</span>
                                                <span className="text-emerald-400 font-medium">{stats.progress.totalCredits.toFixed(1)} / 130 単位</span>
                                            </div>
                                            <div className="w-full bg-slate-700 rounded-full h-2">
                                                <div className="bg-emerald-500 h-2 rounded-full" style={{ width: `${Math.min((stats.progress.totalCredits / 130) * 100, 100)}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </TrackerCard>
                            </div>

                            {/* Charts */}
                            {parsedData.length > 0 && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-surface border border-slate-700 rounded-2xl p-6 shadow-lg h-64 flex flex-col">
                                        <h3 className="text-sm font-medium text-slate-300 mb-2">学期ごとのGPA推移</h3>
                                        <div className="flex-1 relative"><canvas ref={lineChartRef}></canvas></div>
                                    </div>
                                    <div className="bg-surface border border-slate-700 rounded-2xl p-6 shadow-lg h-64 flex flex-col">
                                        <h3 className="text-sm font-medium text-slate-300 mb-2">評価分布</h3>
                                        <div className="flex-1 relative"><canvas ref={pieChartRef}></canvas></div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
